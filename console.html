<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - Terracotta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="./manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { background-color: #111; color: #FFF9E5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Space Mono', monospace; }
        .sidebar-btn { text-align: left; padding: 12px 16px; width: 100%; border-left: 4px solid transparent; color: #888; transition: all 0.2s; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar-btn:hover { background-color: #222; color: white; }
        .sidebar-btn.active { background-color: #222; color: #B32A19; border-left-color: #B32A19; font-weight: bold; }
        .input-dark { background: #000; border: 1px solid #333; color: white; padding: 8px; font-family: 'Space Mono'; }
        .input-dark:focus { border-color: #B32A19; outline: none; }
        .btn-action { background: #B32A19; color: white; border: 1px solid #B32A19; text-transform: uppercase; font-weight: bold; transition: all 0.2s; }
        .btn-action:hover { background: #922214; }
        .active-projection-btn { background-color: #B32A19 !important; color: white !important; border-color: white !important; }
        .hidden-tab { display: none; }
        /* Spreadsheet DB Table Styles */
        .db-grid { border-collapse: collapse; width: 100%; font-size: 10px; }
        .db-grid th, .db-grid td { border: 1px solid #333; padding: 6px; text-align: left; white-space: nowrap; }
        .db-grid th { background: #000; color: #888; position: sticky; top: 0; z-index: 10; }
        .db-grid td:focus { background: #B32A19; outline: none; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <header class="h-14 bg-black border-b border-[#333] flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-terminal text-[#B32A19]"></i>
            <span class="font-bold text-lg tracking-widest text-white">ADMIN_CONSOLE</span>
        </div>
        <button onclick="window.open('projection.html', 'Projection', 'width=1280,height=720')" class="bg-[#B32A19] text-xs px-4 py-2 font-bold uppercase hover:bg-red-700 transition">
            Launch Projection Window <i class="fa-solid fa-arrow-up-right-from-square ml-2"></i>
        </button>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <nav class="w-64 bg-[#151515] p-0 flex flex-col border-r border-[#333] shrink-0 overflow-y-auto">
            <div class="p-4 text-[10px] text-[#555] font-bold uppercase tracking-widest mt-2">Core Systems</div>
            <button onclick="switchTab('dashboard')" class="sidebar-btn active" id="tab-dashboard">Master Dashboard</button>
            <button onclick="switchTab('database')" class="sidebar-btn" id="tab-database">DB Editor (Live)</button>
            <button onclick="switchTab('projection')" class="sidebar-btn" id="tab-projection">Projection Control</button>
        </nav>

        <main class="flex-1 bg-[#111] p-8 overflow-y-auto">
            
            <!-- TAB MASTER DASHBOARD -->
            <div id="content-dashboard" class="content-tab space-y-8">
            <h2 class="text-2xl font-bold border-b border-333 pb-4 text-B32A19">Master Dashboard</h2>
            
                <!-- Arrival Status / ETA -->
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-1a1a1a border border-333 p-6">
                    <p class="text-10px uppercase text-gray-500 mb-4 tracking-widest">Arrival Status</p>
                    <div id="arrival-stats" class="space-y-3">
                        <div class="flex justify-between">
                        <span class="text-gray-400">Arrived</span>
                        <span id="arrived-count" class="font-bold text-2xl text-green-400">0</span>
                        </div>
                        <div class="flex justify-between">
                        <span class="text-gray-400">On Way</span>
                        <span id="onway-count" class="font-bold text-2xl text-blue-400">0</span>
                        </div>
                        <div class="flex justify-between">
                        <span class="text-gray-400">Pending</span>
                        <span id="pending-count" class="font-bold text-2xl text-yellow-400">0</span>
                        </div>
                    </div>
                    </div>
                    
                    <!-- ETA Breakdown -->
                    <div class="bg-1a1a1a border border-333 p-6">
                    <p class="text-10px uppercase text-gray-500 mb-4 tracking-widest">ETA Timeline</p>
                    <div id="eta-timeline" class="space-y-2 text-sm">
                        <div class="flex justify-between"><span>T+0</span><span id="eta-t0" class="text-blue-400">0</span></div>
                        <div class="flex justify-between"><span>T+1</span><span id="eta-t1" class="text-blue-400">0</span></div>
                        <div class="flex justify-between"><span>T+2</span><span id="eta-t2" class="text-blue-400">0</span></div>
                        <div class="flex justify-between"><span>T+3</span><span id="eta-t3" class="text-blue-400">0</span></div>
                    </div>
                    </div>
                </div>

                <!-- Guests by Squad + Squad Dashboard -->
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-1a1a1a border border-333 p-6">
                    <p class="text-10px uppercase text-gray-500 mb-4 tracking-widest">Guests by Squad</p>
                    <div id="squad-breakdown" class="space-y-2">
                        <!-- Populated by JS -->
                    </div>
                    </div>
                    
                    <div class="bg-1a1a1a border border-333 p-6">
                    <p class="text-10px uppercase text-gray-500 mb-4 tracking-widest">Squad Scores</p>
                    <div id="squad-scores" class="space-y-2">
                        <!-- Populated by JS -->
                    </div>
                    </div>
                </div>

                <!-- Live Event Rundown -->
                <div class="bg-black border-2 border-B32A19 p-6">
                    <p class="text-10px uppercase text-gray-400 mb-4 tracking-widest">Live Event Rundown</p>
                    <div id="event-rundown" class="space-y-2 text-xs font-mono text-gray-300">
                    <!-- Populated by JS from Google Sheets or static -->
                    </div>
                </div>
            </div>

            <!-- TAB: DATABASE EDITOR -->
            <div id="content-database" class="content-tab hidden space-y-4 flex flex-col h-full">
                <div class="flex justify-between items-center border-b border-[#333] pb-4">
                    <h2 class="text-2xl font-bold text-[#B32A19]">Direct Supabase Editor</h2>
                    <select id="db-table-select" class="input-dark uppercase text-xs">
                        <option value="profile">profile</option>
                        <option value="status">status</option>
                        <option value="survey">survey</option>
                        <option value="game">game</option>
                        <option value="reception">reception</option>
                        <option value="blessing">blessing</option>
                        <option value="push_subscriptions">push_subscriptions</option>
                    </select>
                </div>
                <div class="flex-1 overflow-auto border border-[#333] bg-[#1a1a1a]">
                    <table class="db-grid" id="db-table">
                        <thead id="db-head"></thead>
                        <tbody id="db-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- TAB: PROJECTION CONTROL -->
            <div id="content-projection" class="content-tab hidden space-y-8">
                <h2 class="text-2xl font-bold border-b border-[#333] pb-4 text-[#B32A19]">Projection Matrix</h2>
                <div class="grid grid-cols-2 gap-8">
                    <!-- Screen Toggle -->
                    <div class="bg-[#1a1a1a] border border-[#333] p-6">
                        <h3 class="text-sm font-bold uppercase mb-6 text-gray-500">Active Display View</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <button id="toggle-memory-btn" onclick="setProjectionMode('memory')" class="active-projection-btn flex flex-col items-center p-6 border-2 border-[#333] hover:border-[#B32A19] transition">
                                <i class="fa-solid fa-images text-4xl mb-3"></i><span class="font-bold">Memory Lane</span>
                            </button>
                            <button id="toggle-wheel-btn" onclick="setProjectionMode('wheel')" class="flex flex-col items-center p-6 border-2 border-[#333] hover:border-[#B32A19] transition">
                                <i class="fa-solid fa-dharmachakra text-4xl mb-3"></i><span class="font-bold">Wheel of Fortune</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Wheel Controls -->
                    <div class="bg-[#1a1a1a] border border-[#333] p-6 flex flex-col justify-center">
                        <h3 class="text-sm font-bold uppercase mb-4 text-gray-500">Wheel Trigger</h3>
                        <button onclick="triggerWheelSpin()" class="btn-action w-full py-6 text-2xl shadow-lg mb-4">
                            <i class="fa-solid fa-bolt mr-2"></i> INITIATE SPIN
                        </button>
                        <div id="latest-spin-result" class="text-center font-bold text-lg text-var--cream"></div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="console.js"></script>
    <script src="projection.js"></script>
</body>
</html>
